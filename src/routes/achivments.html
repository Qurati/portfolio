<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои достижения</title>
    <link rel="stylesheet" href="../style/style.css">
</head>
<body>
    <div class="achievements-wrapper">
        <div class="achievements-header">
            <h1>Достижения</h1>
        </div>
        <div class="achievements-grid">
            <div class="gallery-item">
                <img src="../img/15.png" alt="Достижение 15" onclick="openImage(this.src)">
            </div>
            <div class="gallery-item">
                <img src="../img/11.png" alt="Достижение 11" onclick="openImage(this.src)">
            </div>
            <div class="gallery-item">
                <img src="../img/12.png" alt="Достижение 12" onclick="openImage(this.src)">
            </div>
            <div class="gallery-item">
                <img src="../img/14.png" alt="Достижение 14" onclick="openImage(this.src)">
            </div>
            <div class="gallery-item">
                <img src="../img/6.png" alt="Достижение 6" onclick="openImage(this.src)">
            </div>
            <div class="gallery-item">
                <img src="../img/13.png" alt="Достижение 13" onclick="openImage(this.src)">
            </div>
            <div class="gallery-item">
                <img src="../img/1.png" alt="Достижение 1" onclick="openImage(this.src)">
            </div>
            <div class="gallery-item">
                <img src="../img/8.png" alt="Достижение 8" onclick="openImage(this.src)">
            </div>
            <div class="gallery-item">
                <img src="../img/9.png" alt="Достижение 9" onclick="openImage(this.src)">
            </div>
            <div class="gallery-item">
                <img src="../img/5.png" alt="Достижение 5" onclick="openImage(this.src)">
            </div>
            <div class="gallery-item">
                <img src="../img/10.png" alt="Достижение 10" onclick="openImage(this.src)">
            </div>
            <div class="gallery-item">
                <img src="../img/7.png" alt="Достижение 7" onclick="openImage(this.src)">
            </div>
            <div class="gallery-item">
                <img src="../img/2.png" alt="Достижение 2" onclick="openImage(this.src)">
            </div>
            <div class="gallery-item">
                <img src="../img/3.png" alt="Достижение 3" onclick="openImage(this.src)">
            </div>
            <div class="gallery-item">
                <img src="../img/4.png" alt="Достижение 4" onclick="openImage(this.src)">
            </div>
        </div>
    </div>

    <div id="imageModal" class="modal" onclick="closeImage()">
        <span class="close">&times;</span>
        <img class="modal-content" id="fullImage">
    </div>

    <script>
        function openImage(src) {
            const modal = document.getElementById('imageModal');
            const fullImage = document.getElementById('fullImage');
            modal.style.display = "flex";
            fullImage.src = src;
        }

        function closeImage() {
            const modal = document.getElementById('imageModal');
            modal.style.display = "none";
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeImage();
            }
        });
    </script>
</body>
</html>
